<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Operations Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 20px;
            text-align: center;
        }
        .container {
            margin: 20px 0;
        }
        .checklist, .reports, .management {
            background: #ffffff;
            padding: 20px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .shift-item {
            margin: 10px 0;
        }
        button {
            background: #35424a;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Shipping Operations Dashboard</h1>
    </header>
    <div class="container">
        <div class="checklist">
            <h2>Shift Checklists</h2>
            <div id="checklistItems"></div>
            <input type="text" id="newChecklistItem" placeholder="Add checklist item...">
            <button onclick="addChecklistItem()">Add</button>
        </div>
        <div class="reports">
            <h2>Reports</h2>
            <button onclick="generateReport()">Generate Report</button>
            <div id="reportOutput"></div>
        </div>
        <div class="management">
            <h2>Management Features</h2>
            <button onclick="clearStorage()">Clear All Data</button>
        </div>
    </div>
    <script>
        const checklistItems = JSON.parse(localStorage.getItem('checklistItems')) || [];

        function displayChecklist() {
            const checklistContainer = document.getElementById('checklistItems');
            checklistContainer.innerHTML = '';
            checklistItems.forEach((item, index) => {
                checklistContainer.innerHTML += `<div class='shift-item'>` +
                    `<input type='checkbox' id='item-${index}' ${item.completed ? 'checked' : ''} onclick='toggleChecklistItem(${index})'>` +
                    `<label for='item-${index}'>${item.text}</label>
                    `<button onclick='removeChecklistItem(${index})'>Remove</button>` +
                `</div>`;
            });
        }

        function addChecklistItem() {
            const newItemText = document.getElementById('newChecklistItem').value;
            if (newItemText) {
                checklistItems.push({ text: newItemText, completed: false });
                localStorage.setItem('checklistItems', JSON.stringify(checklistItems));
                document.getElementById('newChecklistItem').value = '';
                displayChecklist();
            }
        }

        function toggleChecklistItem(index) {
            checklistItems[index].completed = !checklistItems[index].completed;
            localStorage.setItem('checklistItems', JSON.stringify(checklistItems));
            displayChecklist();
        }

        function removeChecklistItem(index) {
            checklistItems.splice(index, 1);
            localStorage.setItem('checklistItems', JSON.stringify(checklistItems));
            displayChecklist();
        }

        function generateReport() {
            const reportOutput = document.getElementById('reportOutput');
            reportOutput.innerHTML = `Report generated: ${new Date().toISOString()}`;
        }

        function clearStorage() {
            localStorage.removeItem('checklistItems');
            checklistItems.length = 0;
            displayChecklist();
        }

        window.onload = displayChecklist;
    </script>
</body>
</html>
